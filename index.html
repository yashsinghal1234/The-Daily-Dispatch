<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Dispatch</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=UnifrakturMaguntia&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="masthead">
    <div class="masthead-top">
      <div class="masthead-meta left">
        <span id="today-date"></span>
        <span class="separator">·</span>
        <span id="user-location">Detecting location…</span>
      </div>
      <div class="masthead-logo">
        <h1 class="paper-name">The Daily Dispatch</h1>
        <p class="paper-tagline">Truth. Clarity. Perspective.</p>
      </div>
      <div class="masthead-meta right">
        <span>Est. 2025</span>
        <span class="separator">·</span>
        <span>Vol. I</span>
      </div>
    </div>
    <div class="masthead-rule"></div>
    <nav class="controls-bar">
      <div class="controls-inner">
        <select id="country" title="Select country">
          <option value="auto">📍 Auto-detect</option>
          <option value="world">🌐 Worldwide</option>
          <option value="USA">🇺🇸 USA</option>
          <option value="India">🇮🇳 India</option>
          <option value="UK">🇬🇧 UK</option>
          <option value="Australia">🇦🇺 Australia</option>
          <option value="Canada">🇨🇦 Canada</option>
          <option value="France">🇫🇷 France</option>
          <option value="Germany">🇩🇪 Germany</option>
          <option value="Japan">🇯🇵 Japan</option>
          <option value="China">🇨🇳 China</option>
          <option value="Russia">🇷🇺 Russia</option>
          <option value="Brazil">🇧🇷 Brazil</option>
          <option value="South Africa">🇿🇦 South Africa</option>
          <option value="UAE">🇦🇪 UAE</option>
          <option value="Singapore">🇸🇬 Singapore</option>
        </select>
        <button id="getnews">Load Headlines</button>
      </div>
    </nav>
    <div class="section-rule"></div>
  </header>

  <div class="ticker-wrap" id="ticker-wrap">
    <span class="ticker-label">BREAKING</span>
    <div id="ticker-track"></div>
  </div>

  <main class="paper-body">
    <div id="splash" class="splash">
      <div class="splash-inner">
        <div class="splash-icon">📰</div>
        <h2>Your personalised front page</h2>
        <p>Select your region and click <em>Load Headlines</em></p>
      </div>
    </div>
    <div id="skeleton" class="skeleton-grid" style="display:none">
      <div class="skel skel-hero"></div>
      <div class="skel skel-side"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
    </div>
    <div id="newslist"></div>
  </main>

  <footer class="paper-footer">
    <div class="footer-rule"></div>
    <p>© 2025 The Daily Dispatch &nbsp;·&nbsp; Powered by AI Web Search, Made by Yash Singhal &nbsp;·&nbsp; <span id="footer-location"></span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
